name: Build Magisk Module

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gcc
        run: sudo apt-get update -qq && sudo apt-get install -y -qq gcc

      - name: Compile MAIN binary
        run: gcc -O2 -o MAIN main.c -lpthread

      - name: Package Magisk Module
        id: package
        run: |
          MODULE_ID=$(grep '^id=' module.prop | cut -d= -f2)
          MODULE_VER=$(grep '^version=' module.prop | cut -d= -f2)
          BUILD_NUM=${{ github.run_number }}
          ZIP_NAME="${MODULE_ID}-${MODULE_VER}-${BUILD_NUM}.zip"
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          echo "MODULE_VER=${MODULE_VER}" >> $GITHUB_ENV
          echo "BUILD_NUM=${BUILD_NUM}" >> $GITHUB_ENV
          mkdir -p _module
          cp -r META-INF webroot customize.sh module.prop service.sh uninstall.sh MAIN _module/
          cd _module && zip -r9 "../${ZIP_NAME}" . && cd ..

      - name: Prepare Telegram message
        run: |
          SHORT_SHA="${{ github.sha }}" && SHORT_SHA="${SHORT_SHA:0:7}"
          BUILD_TIME=$(date -u +%m%d%H%M -d "+8 hours")
          {
          echo "FreshBattery v${MODULE_VER} 构建 #${BUILD_NUM}"
          echo "─────────────────────────"
          echo "文件: ${ZIP_NAME}"
          echo "提交: ${SHORT_SHA}"
          echo "时间: ${BUILD_TIME}"
          echo ""
          printf '%s\n' "${{ github.event.head_commit.message }}"
          echo ""
          echo "提交者: ${{ github.actor }}"
          } > tg_caption.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}

      - name: Send to Telegram
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          if [ ! -f "${ZIP_NAME}" ]; then
            echo "错误: 文件 ${ZIP_NAME} 不存在"
            exit 1
          fi
          echo "发送文件: ${ZIP_NAME}"
          echo "--- caption 内容 ---"
          cat tg_caption.txt
          echo "--- 结束 ---"
          curl -sS --fail -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendDocument" \
            -F chat_id="${CHAT_ID}" \
            -F "document=@${ZIP_NAME}" \
            -F "caption=@tg_caption.txt" \
            -o /dev/null -w "Telegram API 响应: %{http_code}\n"

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
