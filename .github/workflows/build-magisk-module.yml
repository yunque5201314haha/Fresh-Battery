name: Build Magisk Module

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gcc
        run: sudo apt-get update -qq && sudo apt-get install -y -qq gcc

      - name: Compile MAIN binary
        run: gcc -O2 -o MAIN main.c -lpthread

      - name: Package Magisk Module
        id: package
        run: |
          MODULE_ID=$(grep '^id=' module.prop | cut -d= -f2)
          MODULE_VER=$(grep '^version=' module.prop | cut -d= -f2)
          BUILD_NUM=${{ github.run_number }}
          # 标签构建使用无编号的 zip 名，确保 update.json URL 可预测
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            ZIP_NAME="${MODULE_ID}-${MODULE_VER}.zip"
          else
            ZIP_NAME="${MODULE_ID}-${MODULE_VER}-${BUILD_NUM}.zip"
          fi
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          echo "MODULE_VER=${MODULE_VER}" >> $GITHUB_ENV
          echo "BUILD_NUM=${BUILD_NUM}" >> $GITHUB_ENV
          mkdir -p _module
          cp -r META-INF webroot customize.sh module.prop service.sh uninstall.sh MAIN _module/
          cp update.json changelog.md _module/ 2>/dev/null || true
          cd _module && zip -r0 "../${ZIP_NAME}" . && cd ..

      - name: Prepare Telegram message
        run: |
          SHORT_SHA="${{ github.sha }}" && SHORT_SHA="${SHORT_SHA:0:7}"
          BUILD_TIME=$(date -u +%m%d%H%M -d "+8 hours")
          printf '%s\n' \
            "FreshBattery v${MODULE_VER} 构建 #${BUILD_NUM}" \
            "─────────────────────────" \
            "文件: ${ZIP_NAME}" \
            "提交: ${SHORT_SHA}" \
            "时间: ${BUILD_TIME}" \
            "" > tg_caption.txt
          cat >> tg_caption.txt << 'CMTEOF'
          ${{ github.event.head_commit.message }}
          CMTEOF
          printf '\n' >> tg_caption.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}

      - name: Send to Telegram
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          if [ ! -f "${ZIP_NAME}" ]; then
            echo "错误: 文件 ${ZIP_NAME} 不存在"
            exit 1
          fi
          echo "发送文件: ${ZIP_NAME}"
          echo "--- caption 内容 ---"
          cat tg_caption.txt
          echo "--- 结束 ---"
          CAPTION_TEXT=$(cat tg_caption.txt | head -c 1024)
          curl -sS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendDocument" \
            -F chat_id="${CHAT_ID}" \
            -F "document=@${ZIP_NAME}" \
            -F "caption=${CAPTION_TEXT}"

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
